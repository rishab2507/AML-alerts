<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AML Alert Triage Boilerplate</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; max-width: 980px; }
      textarea { width: 100%; height: 260px; font-family: monospace; }
      button { margin-top: 1rem; padding: 0.6rem 1rem; }
      pre { background: #f6f8fa; padding: 1rem; overflow: auto; }
    </style>
  </head>
  <body>
    <h1>AI-assisted AML Alert Triage</h1>
    <p>Paste input JSON and click <strong>Run Triage</strong>.</p>

    <textarea id="input"></textarea>
    <br />
    <button id="run">Run Triage</button>

    <h2>Output</h2>
    <pre id="output">No output yet.</pre>

    <script>
      const sample = {
        customer_profile: {
          risk_category: 'Medium',
          kyc_status: 'Completed',
          account_age_months: 14,
          occupation: 'Retail'
        },
        alert: {
          alert_type: 'High Velocity Transactions',
          triggered_rules: ['R-102', 'R-311']
        },
        transactions: [
          { amount: 98000, type: 'credit', channel: 'UPI', timestamp: '2025-01-01T10:00:00Z' },
          { amount: 97000, type: 'credit', channel: 'UPI', timestamp: '2025-01-01T10:03:00Z' },
          { amount: 99000, type: 'credit', channel: 'UPI', timestamp: '2025-01-01T10:05:00Z' }
        ]
      };

      document.getElementById('input').value = JSON.stringify(sample, null, 2);

      document.getElementById('run').addEventListener('click', async () => {
        const output = document.getElementById('output');
        try {
          const payload = JSON.parse(document.getElementById('input').value);
          const response = await fetch('/api/triage', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          output.textContent = `Error: ${err.message}`;
        }
      });
    </script>
  </body>
</html>
